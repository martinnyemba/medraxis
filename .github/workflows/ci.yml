name: CI

# Continuous integration for the Medraxis platform: lint, migration/system
# checks, and the test suite on both SQLite (fast) and PostgreSQL (the
# production database), plus a Docker image build.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: config.settings.local
  DJANGO_SECRET_KEY: ci-insecure-test-key

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check --output-format=github .

  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migrations are in sync with models
        run: python manage.py makemigrations --check --dry-run
      - name: Django system checks
        run: python manage.py check
      - name: Run test suite
        run: python manage.py test apps --verbosity 2

  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medraxis
          POSTGRES_PASSWORD: medraxis
          POSTGRES_DB: medraxis
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U medraxis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://medraxis:medraxis@localhost:5432/medraxis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migrate on PostgreSQL
        run: python manage.py migrate
      - name: Smoke-test the seed command
        run: python manage.py seed
      - name: Run test suite on PostgreSQL
        run: python manage.py test apps

  docker-build:
    name: Docker image build & smoke test
    runs-on: ubuntu-latest
    needs: [lint, test-sqlite]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: medraxis:ci
      - name: Validate docker-compose.yml
        run: cp .env.example .env && docker compose config --quiet
      - name: Boot the stack
        run: |
          cat >> .env <<EOF
          DJANGO_SECRET_KEY=ci-insecure-smoke-test-key
          DJANGO_SEED_ADMIN_PASSWORD=ci-smoke-test-password
          EOF
          docker compose up -d --build
      - name: Wait for web to become healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q web)" 2>/dev/null || echo starting)
            echo "web health: $status"
            [ "$status" = "healthy" ] && exit 0
            sleep 5
          done
          echo "web never became healthy" >&2
          exit 1
      - name: Seed reference data & admin user
        run: docker compose exec -T web python manage.py seed
      - name: Run smoke test
        env:
          SMOKE_TEST_BASE_URL: http://localhost:8000
          SMOKE_TEST_USERNAME: admin
          SMOKE_TEST_PASSWORD: ci-smoke-test-password
        run: python scripts/smoke_test.py
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v
